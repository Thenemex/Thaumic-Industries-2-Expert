# Configuration file

general {
    # Enables various mixins that allow blocks to dynamically change their sound. [default: true]
    B:blockSoundMixins=true

    # Font rendering replacements [default: true]
    B:enableFontRendererMixin=true

    # Enable client-side resource pack update checking for active packs [default: true]
    B:enableResourcePackUpdateCheck=true

    # Enable GTNH Team commands [default: true]
    B:enableTeamCommands=true

    # If you're not a dev, you don't need this [default: false]
    B:enableTestBlocks=false

    # If you're not a dev, you don't need this [default: false]
    B:enableTestItems=false

    # Show the title/subtitle overlay on screen [default: true]
    B:enableTitleOverlay=true

    # Enable particle effects with title displays [default: true]
    B:enableTitleParticles=true

    # Enable item rendering modifications to allow rendering some items as translucent [default: true]
    B:enableTranslucentItemRenders=true

    # Set to true to no longer check if the NEI version is new enough to support RenderTooltipEvents [default: false]
    B:ignoreNEIVersion=false

    # Larger values take more RAM, but require less model rebuilding (may reduce lag spikes). Unless you are very short on RAM, reducing this is not advised. [range: 1 ~ 1000000, default: 1000]
    I:modelCacheSize=1000

    # Show item icons above the title when provided [default: true]
    B:showTitleIcon=true

    # Size of the subtitle text (default 2.0) [range: 0.5 ~ 8.0, default: 2.0]
    S:subtitleScale=2.0

    # Root name for GTNH Team commands [default: gtnhteam]
    S:teamCommandRoot=gtnhteam

    # The public-facing name for the team system [default: GTNHTeams]
    S:teamSystemName=GTNHTeams

    # Swaps out the block crack texture on modeled blocks, to make it easier to see the rotation. [default: false]
    B:testCrackTexture=false

    # Cinematic completion effect tier: 0 = none, 3 = hyperspace, 4 = singularity, 5 = warp, 6 = lightspeed [range: 0 ~ 6, default: 0]
    I:titleEffectTier=0

    # Icon animation style: none, fly_in, rise, slide, zoom, pop, spin, spin_reverse, bounce, wobble, swing, slam, tada [default: fly_in]
    S:titleIconAnimation=fly_in

    # Vertical offset for the icon relative to the title text, in pixels. Negative = higher, positive = lower. [range: -100 ~ 100, default: 0]
    I:titleIconOffsetY=0

    # Size of the icon above the title (default 2.0, so 32x32 pixels) [range: 0.5 ~ 8.0, default: 2.0]
    S:titleIconScale=2.0

    # Horizontal offset of the title block from screen center, in pixels. Negative = left, positive = right. [range: -1000 ~ 1000, default: 0]
    I:titleOffsetX=0

    # Vertical offset of the title block from screen center, in pixels. Negative = higher, positive = lower. [range: -1000 ~ 1000, default: 0]
    I:titleOffsetY=0

    # Size of the main title text (default 4.0) [range: 0.5 ~ 8.0, default: 4.0]
    S:titleScale=4.0
}



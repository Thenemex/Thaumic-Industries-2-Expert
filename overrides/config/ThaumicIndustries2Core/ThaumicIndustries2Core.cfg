# Configuration file

~CONFIG_VERSION: 1.6

##########################################################################################################
# expert-tweaks
#--------------------------------------------------------------------------------------------------------#
# You can tweak off/on expert changes here
##########################################################################################################

expert-tweaks {
    # Sets a new arcane recipe with harder components
    B:BoneBow=true

    # Sets a new infusion recipe with harder components
    B:CrystalScribingTools=true

    # Sets a new arcane recipe, that will only accept TC4 Phials and not empty bottles
    B:ScribingTools=true

    # Sets a new infusion recipe with arcane bellows and more essentia
    B:SeraphShoulders=true

    # Sets a new arcane recipe using some vis
    B:Thaumometer=true

    # Adds a mystical construct recipe for the vanilla furnace, and adds another one with arcane stone
    B:VanillaFurnace=true
}


##########################################################################################################
# mod-integrations
#--------------------------------------------------------------------------------------------------------#
# You can turn off/on integrations here
##########################################################################################################

mod-integrations {
    B:"Forbidden Magic"=true
    B:"Magic Cookies"=true
    B:"Thaumaturgical Knowledge"=true
    B:"Thaumic Bases"=true
    B:"Witching Gadgets"=true
}


##########################################################################################################
# recipe-merges
#--------------------------------------------------------------------------------------------------------#
# You can tweak off/on recipe merges here
##########################################################################################################

recipe-merges {
    # Delete the 2 additionnal recipes, and add one under Alchemy / Alchemical Duplication
    B:"Redstone -> Redstone"=true
    I:"Redstone -> Redstone : Aspect - Machina"=3
    I:"Redstone -> Redstone : Aspect - Potentia"=5
    I:"Redstone -> Redstone : Output - Redstone"=2

    # Delete the 4 additionnal recipes, and add one under Alchemy / Entropic Process
    B:"Wool -> String"=true
    I:"Wool -> String : Aspect - Fabrico"=5
    I:"Wool -> String : Aspect - Perditio"=3
    I:"Wool -> String : Output - String"=3
}


